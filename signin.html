<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signin</title>
    <style>
        *{
            margin: 0;
        }
        .logo{
        width: 155px;
        height: 80px;
        position: relative;
        left: 20px;
        top: -5px;
        cursor: pointer;
    }
    *{
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    .inpcon{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        top: 39px;

    }
    #si{
        position: relative;
        left: -110px;
        top: -10px;
        font-size: 30px;
        font-weight:bold;
        letter-spacing: -1px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
   .incon{
    display: flex;
    flex-direction: column;
   }
   .inp{
    position: relative;
    top: 1px;
   }
   #inun{
    width: 300px;
    height:  30px;
    border-radius: 5px;
    border: 1px solid lightgray;
    background-color: whitesmoke;
    padding: 3px;
   }
   #ins{
    height: 35px;
    width: 305px;
    position: relative;
    top: 25px;
    background-color:blue;
    color: white;
    border-radius: 5px;
    border: none;
   }
   #ins:hover{
    background-color: rgb(83, 83, 252);
   }
   #linecon{
    position: relative;
    top: 30px;
   }
   .line1{
    height: 1px;
    width: 150px;
    background-color: gray;
    position: relative;
    top: 23px;
    left: -100px;
   }
   .line2{
     height: 1px;
    width: 150px;
    background-color: gray;
    position: relative;
    left: 100px;
    top: 2px;
   }
   #linep{
    position: relative;
    left: 65px;
    top: 10px;
   }
   #ca{
     height: 35px;
    width: 305px;
    position: relative;
    top: 55px;
    background-color:black;
    color: white;
    border-radius: 5px;
    border: none;
   }
   #ca:hover{
    background-color: whitesmoke;
    color: black;
    font-weight: bold;
    border: 2px solid black;
   }
    footer{
        background-color:whitesmoke;
        position: relative;
        top: 175px;
        height: 20vh;
        
    }
    #fp{
       color: lightgray;
       display: flex;
       justify-content: center;
       position:relative;
       top: 25px;
        font-size: 15px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #fl{
        list-style-type: none;
        display: flex;
        gap: 25px;
        position: relative;
        justify-content: center;
        top: 80px;
    }
    #fa{
        text-decoration: none;
        color: black;
        display: flex;
    }

    </style>
</head>
<body>
    <header>
         <img src="teslalogo.png" class="logo" alt="logo">
    </header>
    <main>
        <div class="inpcon">
        <h1 id="si">Sign In</h1>
        <div class="incon">
            <p class="inp">Username</p>
            <input type="text" id="inun" placeholder="">
        </div>
        <div class="incon">
            <p class="inp">Password</p>
            <input type="password" id="inun" placeholder="">
        </div>
        <button id="ins">Sign In</button>
        <div id="linecon">
        <div class="line1"></div><p id="linep">Or</p><div class="line2"></div>
        </div>
        <a href="signup.html"><button id="ca">Create Account</button></a>
        </div>

    </main>
    <footer>
          <ul id="fl">
           <li> <a href="#" id="fa">News</a></li>
           <li> <a href="#" id="fa">Get Updates</a></li>
           <li> <a href="#" id="fa">Location</a></li>
          </ul>
    </footer>
</body>
</html>
